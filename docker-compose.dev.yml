services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
      target: builder
    container_name: smart_hr_backend_dev
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - ./shared:/app/shared
      - /app/node_modules
      - /app/shared/node_modules
    command: npm run start:dev
    networks:
      - smart_hr_network

networks:
  smart_hr_network:
    name: smart_hr_network
