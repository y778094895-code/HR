user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    client_max_body_size 50m;

    upstream backend {
        server backend:3000;
    }

    upstream ml_service {
        server ml-service:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 8080;

        # Security headers
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
            always;
        add_header X-Frame-Options          "DENY"            always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header Referrer-Policy          "strict-origin"   always;
        add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

        # ML service — must come BEFORE /api/ so /api/ml/* is matched first
        # Client sends to ${baseURL}/ml/* which resolves to /api/ml/*
        location /api/ml/ {
            rewrite ^/api/ml/(.*) /$1 break;
            proxy_pass         http://ml_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # REST API — no trailing slash: preserves /api prefix for backend rootPath
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ML service (legacy direct path — kept for backward compat)
        location /ml/ {
            proxy_pass         http://ml_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws {
            proxy_pass             http://backend/ws;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # Frontend (catch-all)
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
