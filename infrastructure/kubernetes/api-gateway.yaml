apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smart-hr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: smart-hr/api-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: EMPLOYEE_SERVICE_URL
          value: "http://employee-service:3000"
        - name: FAIRNESS_SERVICE_URL
          value: "http://fairness-service:3000"
        - name: INTERVENTION_SERVICE_URL
          value: "http://intervention-service:3000"
        - name: ML_SERVICE_URL
          value: "http://ml-service:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: smart-hr
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
