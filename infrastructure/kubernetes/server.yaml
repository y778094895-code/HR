apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-hr-server
  namespace: smart-hr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-hr-server
  template:
    metadata:
      labels:
        app: smart-hr-server
    spec:
      containers:
      - name: server
        image: smart-hr/server:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database_url
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq:5672"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: employee-service
  namespace: smart-hr
spec:
  selector:
    app: smart-hr-server
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: fairness-service
  namespace: smart-hr
spec:
  selector:
    app: smart-hr-server
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: intervention-service
  namespace: smart-hr
spec:
  selector:
    app: smart-hr-server
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
