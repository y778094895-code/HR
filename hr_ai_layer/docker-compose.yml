services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg://postgres:postgres@postgres:5432/hr_intelligence
      --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - mlruns:/mlruns

volumes:
  pgdata:
  mlruns:
