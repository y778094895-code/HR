name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMES: employee-service fairness-service ml-service gateway

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run backend tests
        run: |
          cd server
          npm ci
          npm test
      
      - name: Run ML service tests
        run: |
          cd ml-service
          pip install -r requirements.txt
          pytest tests/
      
      - name: Run integration tests
        run: |
          docker-compose -f docker-compose.test.yml up --abort-on-container-exit

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [employee-service, fairness-service, ml-service, gateway]
    steps:
      - uses: actions/checkout@v3
      
      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./infrastructure/docker/Dockerfile.${{ matrix.image }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:latest
          build-args: |
            VERSION=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Configure Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to Kubernetes
        run: |
          # Update images
          for service in employee-service fairness-service ml-service gateway; do
            kubectl set image deployment/$service \
              $service=${{ env.REGISTRY }}/${{ github.repository }}/$service:${{ github.sha }} \
              -n smart-performance
          done
          
          # Watch rollout
          kubectl rollout status deployment/employee-service -n smart-performance
      
      - name: Smoke test
        run: |
          curl -f https://api.smartperformance.com/health || exit 1
