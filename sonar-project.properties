# --- Project identity ---
sonar.projectKey=smart_performance_system
sonar.projectName=smart_performance_system
sonar.sourceEncoding=UTF-8

# --- Monorepo sources (TS + Python) ---
sonar.sources=client/src,server/api,server/services,server/shared,server/_core,shared,ml-service

# --- Tests locations ---
sonar.tests=tests,server/tests,ml-service/tests

# --- TypeScript config paths (important for TS analysis) ---
sonar.typescript.tsconfigPaths=tsconfig.json,client/tsconfig.json,server/tsconfig.json

# --- Python settings ---
sonar.python.version=3.11

# --- Exclusions (build artifacts, deps, backups, data, generated, logs) ---
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/client/dist/**,**/server/dist/**,**/legacy-backup-*/**,postgres/**,storage/**,**/*.min.*,\
**/*.log,**/*.png,**/*.jpg,**/*.jpeg,**/*.webp,**/*.svg,**/*.ico,**/*.map

# --- CPD exclusions (duplication) لتقليل الضوضاء ---
sonar.cpd.exclusions=**/dist/**,**/build/**,**/client/dist/**,**/server/dist/**,**/legacy-backup-*/**,postgres/**,storage/**

# (اختياري) لو عندك تقارير تغطية لاحقاً:
# sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info
# sonar.python.coverage.reportPaths=ml-service/coverage.xml